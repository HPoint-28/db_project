version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  auth-service:
    build: ./services/auth_service
    ports:
      - "8000:8000"
    volumes:
      - ./services/auth_service:/app
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis

  shop_service:
    build: ./services/shop_service
    ports:
      - "8001:8000"
    volumes:
      - ./services/shop_service:/app
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis

  worker_service:
    build: ./services/worker_service
    ports:
      - "8002:8000"
    volumes:
      - ./services/worker_service:/app
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis

  redis:
    image: redis:alpine
    ports: 
      - "6379:6379"